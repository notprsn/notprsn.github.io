<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Travel atlas and essay index for Prasann Iyer.">
    <meta name="author" content="Prasann Iyer">
    <meta name="site-version" content="20260403145156605">
    <title>Travel Essays | Prasann Iyer</title>
    <link href="../../img/favicon.png" rel="icon" type="image/png" sizes="128x128">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link href="../../css/style.css?v=20260403145156605" rel="stylesheet">
    <link href="../../css/pages/essays.css?v=20260403145156605" rel="stylesheet">
</head>

<body class="page-essays page-travel-atlas">
    <header class="site-header">
        <div class="site-nav-shell">
            <a class="site-brand" href="/">Prasann Iyer</a>
            <nav class="site-nav" aria-label="Primary">
                <a href="/work/">Work</a>
                <a href="/projects/">Projects</a>
                <a href="/fun/">Fun Stuff</a>
                <a href="/essays/" aria-current="page">Essays</a>
            </nav>
        </div>
    </header>

    <main class="page-main page-main--travel-atlas" data-travel-page>
        <section class="travel-atlas-hero">
            <div>
                <p class="eyebrow">Travel</p>
                <h1>Catch 'em all!</h1>
            </div>
        </section>

        <section class="section-block" id="by-place">
            <div class="section-head">
                <div>
                    <h2>By Place</h2>
                </div>
            </div>

            <div class="travel-map-stage" data-travel-map-stage>
                <div class="travel-map-toolbar" aria-label="Map controls">
                    <span class="travel-map-toolbar__hint">Zoom in/out, pan hover</span>
                    <button class="project-card-action" type="button" data-map-back hidden>Back to World</button>
                    <button class="project-card-action" type="button" data-map-reset>Reset</button>
                </div>
                <div class="travel-map-canvas">
                    <div class="travel-map-hover-pill" data-travel-pill hidden></div>
                    <svg data-travel-map aria-label="World map of travel essays" role="img"></svg>
                </div>
            </div>
        </section>

        <section class="section-block" id="by-chronology">
            <div class="section-head">
                <div>
                    <h2>By Chronology</h2>
                </div>
            </div>

            <div class="travel-timeline-shell">
                <div class="travel-timeline-frame">
                    <svg data-travel-timeline aria-label="Timeline of travel essays" role="img"></svg>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-shell">
            <span>Travel Essays</span>
            <div class="footer-links">
                <a href="/essays/">Essays</a>
                <span class="footer-link-placeholder">Gallery</span>
                <span class="footer-link-placeholder">Glossary</span>
                <a href="https://github.com/notprsn" target="_blank" rel="noreferrer">GitHub</a>
            </div>
            <span>&copy; <span data-current-year>2026</span> Prasann Iyer</span>
        </div>
    </footer>

    <script type="module" src="../../js/site.js?v=20260403145156605"></script>
    <script type="module" src="../../js/pages/travel.js?v=20260403145156605"></script>
</body>

</html>
