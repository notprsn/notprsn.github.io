<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Client-side encrypted love letters archive.">
    <meta name="author" content="Prasann Iyer">
    <meta name="site-version" content="20260403104050177">
    <title>Love Letters | Prasann Iyer</title>
    <link href="../img/favicon.png" rel="icon" type="image/png" sizes="128x128">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link href="../css/style.css?v=20260403104050177" rel="stylesheet">
    <link href="../css/pages/love.css?v=20260403104050177" rel="stylesheet">
</head>

<body class="page-love page-dark">
    <header class="site-header">
        <div class="site-nav-shell">
            <a class="site-brand" href="/">Prasann Iyer</a>
            <nav class="site-nav" aria-label="Primary">
                <a href="/work/">Work</a>
                <a href="/projects/">Projects</a>
                <a href="/fun/">Fun Stuff</a>
                <a href="/essays/">Essays</a>
            </nav>
        </div>
    </header>

    <main class="page-main page-main--love">
        <section class="page-intro">
            <div>
                <p class="eyebrow">Love Letters</p>
                <h1 class="love-title">What's 729 by 2?</h1>
            </div>
        </section>

        <section class="lock-grid lock-grid--single">
            <article class="lock-panel">
                <form data-love-letters-form>
                    <input class="sr-only" type="text" name="archive-name" value="love-letters" autocomplete="username"
                        tabindex="-1" aria-hidden="true">
                    <div class="form-row">
                        <label class="lock-label" for="love-letters-password">Answer</label>
                        <div class="lock-answer-row">
                            <input class="lock-input" id="love-letters-password" name="password" type="text"
                                autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" required>
                            <button class="lock-button lock-button--icon" type="submit" aria-label="Submit answer">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M4.75 12h12.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.7"/>
                                    <path d="m12.5 5.75 6.75 6.25-6.75 6.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </form>
                <p class="status-text" data-love-letters-status>Locked.</p>
            </article>
        </section>

        <section class="letters-output" data-love-letters-output hidden>
            <article class="letter-shell letter-shell--intro">
                <p class="panel-label">Archive</p>
                <h2 data-archive-title>Love Letters</h2>
                <p data-archive-intro></p>
            </article>
            <div class="letters-list" data-letters-list></div>
        </section>
    </main>

    <dialog class="love-modal" data-love-modal>
        <div class="love-modal__body">
            <p class="love-modal__message" data-love-modal-message></p>
            <button class="lock-button love-modal__close" type="button" data-love-modal-close>Close</button>
        </div>
    </dialog>

    <footer class="site-footer site-footer--love">
        <div class="footer-shell">
            <span>Love Letters</span>
            <div class="footer-links">
                <a href="/about/">About</a>
                <a href="/gallery/">Gallery</a>
                <a href="/glossary/">Glossary</a>
                <a href="https://github.com/notprsn" target="_blank" rel="noreferrer">GitHub</a>
            </div>
            <span>&copy; <span data-current-year>2026</span> Prasann Iyer</span>
        </div>
    </footer>

    <script type="module" src="../js/site.js?v=20260403104050177"></script>
    <script type="module" src="../js/pages/love-letters.js?v=20260403104050177"></script>
</body>

</html>
