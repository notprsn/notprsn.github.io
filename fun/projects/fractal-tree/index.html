<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Interactive recursive fractal tree with angle, shrink, fullness, and breeze controls.">
    <meta name="author" content="Prasann Iyer">
    <meta name="site-version" content="20260404125013018">
    <title>Fractal Tree | Prasann Iyer</title>
    <link href="../../../img/favicon.png" rel="icon" type="image/png" sizes="128x128">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="../../../css/style.css?v=20260404125013018" rel="stylesheet">
    <link href="../../../css/pages/fun-projects.css?v=20260404125013018" rel="stylesheet">
    <link href="style.css?v=20260404125013018" rel="stylesheet">
</head>
<body class="tree-page page-dark">
    <header class="site-header">
        <div class="site-nav-shell">
            <a class="site-brand" href="/">Prasann Iyer</a>
            <div class="site-nav-tools">
                <nav class="site-nav" aria-label="Primary">
                    <a href="/work/">Work</a>
                    <a href="/projects/">Projects</a>
                    <a href="/fun/" aria-current="page">Fun Stuff</a>
                    <a href="/essays/">Essays</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="fun-project-main">
        <section class="fun-project-layout">
            <aside class="fun-project-sidebar">
                <section class="fun-project-copy-card">
                    <h1>Fractal Tree</h1>
                    <p>CS101 but vibe-coded</p>
                </section>

                <div class="fun-project-controls-card">
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Angle</span>
                            <output data-output-for="angleDeg">22.50°</output>
                        </div>
                        <input name="angleDeg" type="range" min="15" max="30" step="0.25" value="22.5">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Shrink</span>
                            <output data-output-for="branchRatio">0.68</output>
                        </div>
                        <input name="branchRatio" type="range" min="0.62" max="0.74" step="0.01" value="0.68">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Fullness</span>
                            <output data-output-for="fullness">5</output>
                        </div>
                        <input name="fullness" type="range" min="1" max="9" step="1" value="5">
                    </label>
                    <label class="fun-project-toggle-row">
                        <input name="breeze" type="checkbox" checked>
                        <span>Breeze</span>
                        <output data-output-for="breeze">On</output>
                    </label>
                </div>
            </aside>

            <section class="fun-project-stage">
                <div class="fun-project-display-card">
                    <div id="tree-stage" class="fun-project-display-host" aria-label="Interactive recursive fractal tree viewer"></div>
                </div>
            </section>
        </section>
    </main>
    <footer class="site-footer site-footer--scene">
        <div class="footer-shell">
            <span>Fractal Tree</span>
            <div class="footer-links">
                <a href="/fun/">Fun Stuff</a>
                <a href="/projects/">Projects</a>
                <span class="footer-link-placeholder">Gallery</span>
                <span class="footer-link-placeholder">Glossary</span>
                <a href="https://github.com/notprsn" target="_blank" rel="noreferrer">GitHub</a>
            </div>
            <span>&copy; <span data-current-year>2026</span> Prasann Iyer</span>
        </div>
    </footer>
    <script type="module" src="../../../js/site.js?v=20260404125013018"></script>
    <script src="../p5.min.js?v=20260404125013018"></script>
    <script src="script.js?v=20260404125013018"></script>
</body>
</html>
