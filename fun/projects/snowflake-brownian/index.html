<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Interactive Brownian snowflake with adjustable symmetry and growth behavior.">
    <meta name="author" content="Prasann Iyer">
    <meta name="site-version" content="20260401201416694">
    <title>Brownian Snowflake | Prasann Iyer</title>
    <link href="../../../img/favicon.png" rel="icon" type="image/png" sizes="128x128">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="../../../css/style.css?v=20260401201416694" rel="stylesheet">
    <link href="../../../css/pages/fun-projects.css?v=20260401201416694" rel="stylesheet">
    <link href="style.css?v=20260401201416694" rel="stylesheet">
</head>
<body class="brownian-page page-dark">
    <header class="site-header">
        <div class="site-nav-shell">
            <a class="site-brand" href="/">Prasann Iyer</a>
            <div class="site-nav-tools">
                <nav class="site-nav" aria-label="Primary">
                    <a href="/work/">Work</a>
                    <a href="/projects/">Projects</a>
                    <a href="/fun/" aria-current="page">Fun Stuff</a>
                    <a href="/essays/">Essays</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="fun-project-main">
        <section class="fun-project-layout">
            <aside class="fun-project-sidebar">
                <section class="fun-project-copy-card">
                    <h1>Brownian Snowflake</h1>
                </section>

                <div class="fun-project-controls-card">
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Arms</span>
                            <output data-output-for="arms">6</output>
                        </div>
                        <input name="arms" type="range" min="4" max="9" step="1" value="6">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Particle Radius</span>
                            <output data-output-for="particleRadius">3.0</output>
                        </div>
                        <input name="particleRadius" type="range" min="2.0" max="4.0" step="0.1" value="3.0">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Stickiness</span>
                            <output data-output-for="stickiness">2.0</output>
                        </div>
                        <input name="stickiness" type="range" min="1.5" max="2.5" step="0.1" value="2.0">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Inward Drift</span>
                            <output data-output-for="inwardDrift">1.2</output>
                        </div>
                        <input name="inwardDrift" type="range" min="1.0" max="2.0" step="0.1" value="1.2">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Jitter</span>
                            <output data-output-for="jitter">3.0</output>
                        </div>
                        <input name="jitter" type="range" min="2.0" max="5.0" step="0.1" value="3.0">
                    </label>
                    <button class="fun-project-button" type="button" data-reset-sim>Regrow</button>
                </div>
            </aside>

            <section class="fun-project-stage">
                <div class="fun-project-display-card">
                    <div id="brownian-stage" class="fun-project-display-host" aria-label="Interactive Brownian snowflake viewer"></div>
                </div>
            </section>
        </section>
    </main>

    <footer class="site-footer site-footer--scene">
        <div class="footer-shell">
            <span>Brownian Snowflake</span>
            <div class="footer-links">
                <a href="/fun/">Fun Stuff</a>
                <a href="/projects/">Projects</a>
                <a href="/gallery/">Gallery</a>
                <a href="/glossary/">Glossary</a>
                <a href="https://github.com/notprsn" target="_blank" rel="noreferrer">GitHub</a>
            </div>
            <span>&copy; <span data-current-year>2026</span> Prasann Iyer</span>
        </div>
    </footer>
    <script type="module" src="../../../js/site.js?v=20260401201416694"></script>
    <script src="../p5.min.js?v=20260401201416694"></script>
    <script src="script.js?v=20260401201416694"></script>
</body>
</html>
