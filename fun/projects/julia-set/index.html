<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="description" content="Interactive Julia set with an ellipse-path phase control, pan, and zoom.">
    <meta name="author" content="Prasann Iyer">
    <meta name="site-version" content="20260331222217187">
    <title>Julia Set | Prasann Iyer</title>
    <link href="../../../img/favicon.ico" rel="icon" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="../../../css/style.css?v=20260331222217187" rel="stylesheet">
    <link href="style.css?v=20260331222217187" rel="stylesheet">
</head>
<body class="julia-page page-dark">
    <header class="site-header site-header--transparent">
        <div class="site-nav-shell site-nav-shell--project">
            <div class="site-brand-lockup">
                <a class="site-brand" href="/fun/">Back to Fun Stuff</a>
                <span class="site-brand-separator" aria-hidden="true"></span>
            </div>
            <nav class="site-nav" aria-label="Primary">
                <a href="/work/">Work</a>
                <a href="/projects/">Projects</a>
                <a href="/fun/" aria-current="page">Fun Stuff</a>
                <a href="/essays/">Essays</a>
            </nav>
        </div>
    </header>

    <main class="julia-main">
        <section class="julia-layout">
            <aside class="julia-sidebar">
                <section class="julia-copy">
                    <h1>Julia Set</h1>
                    <p>
                        A Julia set renderer with an intentionally small control surface.
                    </p>
                </section>

                <div class="julia-panel">
                    <label class="control-row">
                        <div class="control-head">
                            <span>Phase</span>
                            <output data-output-for="phase">0.29π</output>
                        </div>
                        <input name="phase" type="range" min="0" max="3.14159" step="0.001" value="0.925">
                    </label>
                    <label class="control-row">
                        <div class="control-head">
                            <span>Real Radius</span>
                            <output data-output-for="radiusX">0.789</output>
                        </div>
                        <input name="radiusX" type="range" min="0.1" max="1.1" step="0.005" value="0.7885">
                    </label>
                    <label class="control-row">
                        <div class="control-head">
                            <span>Imag Radius</span>
                            <output data-output-for="radiusY">1.000</output>
                        </div>
                        <input name="radiusY" type="range" min="0.1" max="1.1" step="0.005" value="1.0">
                    </label>
                    <button class="julia-button" type="button" data-reset-view>Reset View</button>
                </div>
            </aside>

            <section class="julia-stage">
                <div class="canvas-card">
                    <div id="julia-stage" class="canvas-host" aria-label="Interactive Julia set viewer"></div>
                </div>
            </section>
        </section>
    </main>
    <footer class="site-footer site-footer--scene">
        <div class="footer-shell">
            <span>Julia Set</span>
            <div class="footer-links">
                <a href="/fun/">Fun Stuff</a>
                <a href="/projects/">Projects</a>
                <a href="/gallery/">Gallery</a>
                <a href="/glossary/">Glossary</a>
                <a href="https://github.com/notprsn" target="_blank" rel="noreferrer">GitHub</a>
            </div>
            <span>&copy; <span data-current-year>2026</span> Prasann Iyer</span>
        </div>
    </footer>
    <script src="../../../js/scripts.js?v=20260331222217187"></script>
    <script src="script.js?v=20260331222217187"></script>
</body>
</html>
