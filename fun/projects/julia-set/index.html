<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Julia Set with pinch, swipe, and neon colour drift.">
    <meta name="author" content="Prasann Iyer">
    <meta name="site-version" content="20260403081214068">
    <title>Julia Set | Prasann Iyer</title>
    <link href="../../../img/favicon.png" rel="icon" type="image/png" sizes="128x128">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="../../../css/style.css?v=20260403081214068" rel="stylesheet">
    <link href="../../../css/pages/fun-projects.css?v=20260403081214068" rel="stylesheet">
    <link href="style.css?v=20260403081214068" rel="stylesheet">
</head>
<body class="julia-page page-dark">
    <header class="site-header">
        <div class="site-nav-shell">
            <a class="site-brand" href="/">Prasann Iyer</a>
            <div class="site-nav-tools">
                <nav class="site-nav" aria-label="Primary">
                    <a href="/work/">Work</a>
                    <a href="/projects/">Projects</a>
                    <a href="/fun/" aria-current="page">Fun Stuff</a>
                    <a href="/essays/">Essays</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="fun-project-main">
        <section class="fun-project-layout">
            <aside class="fun-project-sidebar">
                <section class="fun-project-copy-card">
                    <h1>Julia Set</h1>
                    <p>
                        Change <a class="fun-project-text-link" href="https://en.wikipedia.org/wiki/Julia_set" target="_blank" rel="noreferrer">Julia Set</a> to Infinite Sari Embroidery Idea Set. I'd buy that. Sari not sorry. You can pinch, unpinch and swipe to Zoom and Move around the Complex plane.
                    </p>
                </section>

                <div class="fun-project-controls-card">
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Phase</span>
                            <output data-output-for="phase">0.63π</output>
                        </div>
                        <input name="phase" type="range" min="0" max="3.14159" step="0.0001" value="1.9635">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Real Radius</span>
                            <output data-output-for="radiusX">0.725</output>
                        </div>
                        <input name="radiusX" type="range" min="0.1" max="1.1" step="0.0001" value="0.7248">
                    </label>
                    <label class="fun-project-control-row">
                        <div class="fun-project-control-head">
                            <span>Imag Radius</span>
                            <output data-output-for="radiusY">0.737</output>
                        </div>
                        <input name="radiusY" type="range" min="0.1" max="1.1" step="0.0001" value="0.7372">
                    </label>
                    <button class="fun-project-button" type="button" data-reset-view>Reset View</button>
                </div>
            </aside>

            <section class="fun-project-stage">
                <div class="fun-project-display-card">
                    <div id="julia-stage" class="fun-project-display-host" aria-label="Interactive Julia Set viewer"></div>
                </div>
            </section>
        </section>
    </main>
    <footer class="site-footer site-footer--scene">
        <div class="footer-shell">
            <span>Julia Set</span>
            <div class="footer-links">
                <a href="/fun/">Fun Stuff</a>
                <a href="/projects/">Projects</a>
                <a href="/gallery/">Gallery</a>
                <a href="/glossary/">Glossary</a>
                <a href="https://github.com/notprsn" target="_blank" rel="noreferrer">GitHub</a>
            </div>
            <span>&copy; <span data-current-year>2026</span> Prasann Iyer</span>
        </div>
    </footer>
    <script type="module" src="../../../js/site.js?v=20260403081214068"></script>
    <script src="script.js?v=20260403081214068"></script>
</body>
</html>
