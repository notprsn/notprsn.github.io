name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public site
        uses: actions/checkout@v6
        with:
          path: public-site

      - name: Checkout private puzzle
        uses: actions/checkout@v6
        with:
          repository: notprsn/site-private-puzzle
          token: ${{ secrets.PUZZLE_REPO_PAT }}
          path: private-puzzle

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Sync site metadata
        working-directory: public-site
        run: node scripts/sync-site.mjs

      - name: Build Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p _site
          rsync -a public-site/ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'references/' \
            --exclude 'private/' \
            --exclude 'skills/' \
            --exclude 'docs/' \
            --exclude 'scripts/' \
            --exclude 'AGENTS.md' \
            --exclude 'README.md' \
            --exclude 'firestore.rules' \
            --exclude 'firebase.json'

          mkdir -p _site/references _site/docs/project-data
          cp public-site/references/resume_202510_2page.pdf _site/references/
          cp public-site/docs/project-data/cloudscript-word-cloud.svg _site/docs/project-data/
          cp public-site/docs/project-data/cloudscript-word-script.svg _site/docs/project-data/

          mkdir -p _site/secret
          rsync -a private-puzzle/ _site/secret/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'scripts/' \
            --exclude 'red-herrings.json'

          test -f _site/secret/index.html

          missing_robots=0
          while IFS= read -r file; do
            if ! grep -q '<meta name="robots" content="noindex,nofollow">' "$file"; then
              echo "::error file=$file::Missing noindex,nofollow robots meta."
              missing_robots=1
            fi
          done < <(find _site/secret -type f -name '*.html' -print)

          exit "$missing_robots"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
